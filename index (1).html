<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KSP Case Tracker</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input, button { margin: 4px; padding: 6px; }
    .case { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>

<body>

<h2>KSP Case Tracker</h2>

<button onclick="addCase()">Add Case</button>
<button onclick="saveAll()">Save All</button>

<div id="cases"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwCNtCrhv4-7TTpJsz-bC3ol3efs1FAorGkVgaI0V21DvNk0Lrl-jaHXWm6HdplbOV6/exec";

let cases = [];

// ─────────────────────────────
// LOAD
// ─────────────────────────────
function loadCases() {
  fetch(GAS_URL)
    .then(r => r.json())
    .then(data => {
      cases = data.cases || [];
      render();
    });
}

// ─────────────────────────────
// RENDER
// ─────────────────────────────
function render() {
  const div = document.getElementById("cases");
  div.innerHTML = "";

  cases.forEach((c, i) => {
    div.innerHTML += `
      <div class="case">
        <input value="${c.caseNum || ""}" onchange="cases[${i}].caseNum=this.value" placeholder="Case #">
        <input value="${c.title || ""}" onchange="cases[${i}].title=this.value" placeholder="Title">
        <input value="${c.victim || ""}" onchange="cases[${i}].victim=this.value" placeholder="Victim">
        <button onclick="deleteCase(${i})">Delete</button>
      </div>
    `;
  });
}

// ─────────────────────────────
// ADD CASE
// ─────────────────────────────
function addCase() {
  cases.push({
    id: crypto.randomUUID(),
    caseNum: "",
    title: "",
    victim: "",
    opened: new Date().toISOString().split("T")[0],
    closed: false
  });

  render();
}

// ─────────────────────────────
// DELETE CASE (local only)
// ─────────────────────────────
function deleteCase(index) {
  cases.splice(index, 1);
  render();
}

// ─────────────────────────────
// SAVE ALL
// ─────────────────────────────
function saveAll() {
  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cases: cases
    })
  })
  .then(r => r.json())
  .then(res => {
    console.log("Saved:", res);
    loadCases();
  });
}

// initial load
loadCases();
</script>

</body>
</html>
